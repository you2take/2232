<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="header">
    <a href="index.html" class="header__logo" aria-label="2232.inc">
      <img src="assets/logo-white.svg" alt="2232.inc" class="header__logo-img" />
    </a>
    <button class="header__burger" aria-label="Menu" type="button">
      <span></span><span></span>
    </button>
    <nav class="header__nav" aria-label="Global">
      <a href="about.html">About</a>
      <a href="https://www.2232gallery.com/" target="_blank" rel="noopener">Gallery&nbsp;↗</a>
      <a href="contact.html" class="is-active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="container contact-lead">
      <h1 class="contact-lead__title">Let&rsquo;s create <em>something memorable.</em></h1>
      <p class="contact-lead__sub">Drop us a line below.</p>
    </section>

    <section class="container">
      <form class="contact-form" novalidate>
        <div class="contact-form__row">
          <input class="contact-form__input" type="text" name="name" placeholder="Name" aria-label="Name" required />
        </div>
        <div class="contact-form__row">
          <input class="contact-form__input" type="email" name="email" placeholder="Email" aria-label="Email" required />
        </div>
        <div class="contact-form__row">
          <textarea class="contact-form__textarea" name="message" placeholder="Message" aria-label="Message" required></textarea>
        </div>
        <button class="contact-form__submit" type="submit">Send</button>
      </form>
    </section>

    <section class="container contact-direct reveal">
      <p class="contact-direct__label">Or email us directly</p>
      <a class="contact-direct__email" href="mailto:hello@2232.co.jp">hello@2232.co.jp</a>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__brand" aria-label="2232.inc">
      <img src="assets/logo-fv.svg" alt="2232.inc" class="footer__brand-img" />
    </p>
    <div class="footer__sns">
      <a href="https://www.2232gallery.com/" target="_blank" rel="noopener">Gallery</a>
    </div>
    <p class="footer__copy">© 2026 2232.inc — All Rights Reserved</p>
  </footer>

  <script src="js/main.js"></script>
